AWSTemplateFormatVersion: "2010-09-09"
Description: ECR Repository for the eshop application

Resources:
  EshopECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: my-app

      # Scan images for security vulnerabilities automatically on push
      ImageScanningConfiguration:
        ScanOnPush: true

      # Keep only the last 10 images to save storage costs
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

      # Encrypt images at rest using AWS managed key
      EncryptionConfiguration:
        EncryptionType: AES256

      # Tag the repository for easy identification
      Tags:
        - Key: environment
          Value: production
        - Key: project
          Value: eshop
        - Key: managedBy
          Value: cloudformation

# Output the repository URI so it can be referenced elsewhere
Outputs:
  RepositoryURI:
    Description: ECR Repository URI to use in deployment.yaml and GitHub Actions
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/my-app"
    Export:
      Name: EshopECRRepositoryURI

  RepositoryName:
    Description: ECR Repository Name
    Value: !Ref EshopECRRepository
    Export:
      Name: EshopECRRepositoryName