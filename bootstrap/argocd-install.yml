apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
# Install ArgoCD into the cluster
# This is the official ArgoCD install manifest
apiVersion: argoproj.io/v1alpha1
kind: ArgoCD
metadata:
  name: argocd_install
  namespace: argocd
spec:
  server:
    # Expose ArgoCD UI via AWS Load Balancer
    ingress:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: alb
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/backend-protocol: HTTPS
      hosts:
        - henrykumahconsult.org        # Replace with your domain
      tls:
        - hosts:
            - henrykumahconsult.org    # Replace with your domain