# =============================================================
# infra.yml — Infrastructure pipeline
# Replaces eksctl with Terraform
# Replaces long-lived AWS keys with OIDC federation
# Plan on PR, apply on merge to main
# =============================================================

name: Provision Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
  workflow_dispatch: # Keep manual trigger for emergency use

# OIDC requires this permission
permissions:
  contents: read
  id-token: write   # This is what allows GitHub to assume the AWS IAM role
  pull-requests: write # Allows posting plan output as PR comment

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: "./infrastructure"
  AWS_REGION: "us-east-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Terraform Plan (runs on every PR)
  # Engineer reviews the plan before anything changes
  # ─────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # OIDC — no AWS keys stored anywhere
      # GitHub assumes the IAM role directly using a temporary token
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -out=tfplan \
            -no-color \
            2>&1 | tee plan_output.txt
        continue-on-error: true

      # Post the plan output as a PR comment
      # Engineer sees exactly what will change before approving
      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLength = 65000;
            const truncated = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n... [truncated]'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan 📋\n\`\`\`hcl\n${truncated}\n\`\`\`\n*Triggered by @${{ github.actor }}*`
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────
  # JOB 2 — Terraform Apply (runs on merge to main)
  # Requires manual approval via GitHub Environment
  # ─────────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production  # Requires manual approval in GitHub Settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # OIDC — no AWS keys stored anywhere
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform apply \
            -auto-approve \
            -no-color

      # Update kubeconfig so subsequent steps can run kubectl if needed
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name prod-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Verify cluster is healthy
        run: |
          kubectl get nodes
          kubectl get pods -A
