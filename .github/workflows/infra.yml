name: Provision Infrastructure

on:
  workflow_dispatch:             # Manual trigger only — intentional, controlled infra changes

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Provision EKS Cluster
  # ─────────────────────────────────────────────
  provision-cluster:
    name: Provision EKS Cluster
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Inject AWS Account ID into cluster config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          sed -i "s/YOUR_ACCOUNT_ID/${ACCOUNT_ID}/g" cluster_config.yml

      - name: Install eksctl
        run: |
          curl --silent --location \
            "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz" \
            | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin
          eksctl version

      - name: Create EKS cluster if not exists
        run: |
          if ! aws eks describe-cluster --name prod-cluster --region us-east-1 2>/dev/null; then
            echo "Cluster not found — creating..."
            eksctl create cluster -f cluster_config.yml
          else
            echo "Cluster already exists — skipping creation"
          fi

      - name: Scale nodegroup to desired capacity
        run: |
          eksctl scale nodegroup \
            --cluster=prod-cluster \
            --name=app-nodes \
            --nodes=2 \
            --nodes-min=1 \
            --nodes-max=3 \
            --region=us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name prod-cluster --region us-east-1

  # ─────────────────────────────────────────────
  # JOB 2 — Install AWS Load Balancer Controller
  # Must be installed before ArgoCD since ArgoCD
  # needs the ALB ingress to expose its UI
  # ─────────────────────────────────────────────
  install-lbc:
    name: Install Load Balancer Controller
    runs-on: ubuntu-latest
    needs: provision-cluster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name prod-cluster --region us-east-1

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --version 1.14.0 \
            --set clusterName=prod-cluster \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller

      - name: Wait for LBC webhook to be ready
        run: |
          echo "Waiting for Load Balancer Controller webhook to be ready..."
          for i in $(seq 1 40); do
            READY=$(kubectl get endpoints aws-load-balancer-webhook-service \
              -n kube-system \
              -o jsonpath='{.subsets[*].addresses[*].ip}' 2>/dev/null)
            if [ -n "$READY" ]; then
              echo "Webhook is ready — endpoints: $READY"
              exit 0
            fi
            echo "Attempt $i/40 — webhook not ready yet, retrying in 15s..."
            sleep 15
          done
          echo "Webhook did not become ready in time"
          exit 1

  # ─────────────────────────────────────────────
  # JOB 3 — Install ArgoCD
  # ArgoCD takes over managing all other addons
  # and the app after this point via App of Apps
  # ─────────────────────────────────────────────
  install-argocd:
    name: Install ArgoCD
    runs-on: ubuntu-latest
    needs: install-lbc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name prod-cluster --region us-east-1

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      # Install ArgoCD via Helm — pinned for production stability
      - name: Install ArgoCD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            -n argocd --create-namespace \
            --version 7.7.11 \
            --set server.service.type=ClusterIP \
            --set configs.params."server\.insecure"=true

      # Wait for ArgoCD server to be fully ready
      - name: Wait for ArgoCD to be ready
        run: |
          kubectl rollout status deployment/argocd-server \
            -n argocd --timeout=300s

      # Apply the App of Apps — single manifest that tells ArgoCD
      # to watch the apps/ folder and manage everything inside it
      - name: Apply App of Apps
        run: |
          kubectl apply -f argocd-app-of-apps.yml

      # Verify ArgoCD is running and app of apps is registered
      - name: Verify ArgoCD
        run: |
          kubectl get pods -n argocd
          kubectl get applications -n argocd
