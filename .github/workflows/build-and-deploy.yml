# =============================================================
# build-deploy.yml — Build, scan, and deploy pipeline
# Only change from original: long-lived keys replaced with OIDC
# Everything else preserved exactly as you had it
# =============================================================

name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'apps/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # Required for OIDC

env:
  AWS_REGION: "us-east-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build, Scan and Push images to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build Docker Images and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install and test eshop
        run: |
          cd app
          npm install
          npm test --if-present

      - name: Install and test chatbot
        run: |
          cd app/chatbot
          npm install
          npm test --if-present

      # OIDC — replaces AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY
      # Temporary credentials, nothing stored in GitHub Secrets
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repositories if not exists
        run: |
          aws ecr describe-repositories --repository-names my-app --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name my-app \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ env.AWS_REGION }}

          aws ecr describe-repositories --repository-names eshop-chatbot --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name eshop-chatbot \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build eshop Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }} \
            -t ${{ steps.login-ecr.outputs.registry }}/my-app:latest \
            ./app

      - name: Build chatbot Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:${{ github.sha }} \
            -t ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:latest \
            ./app/chatbot

      - name: Scan eshop image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Scan chatbot image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Push eshop image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/my-app:latest

      - name: Push chatbot image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:latest

      - name: Update eshop deployment image tag
        run: |
          sed -i "s|image:.*my-app.*|image: ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }}|g" \
            apps/my-app/deployment.yml

      - name: Update chatbot deployment image tag
        run: |
          sed -i "s|image:.*eshop-chatbot.*|image: ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:${{ github.sha }}|g" \
            apps/my-app/chatbot-deployment.yml

      # ArgoCD detects this commit and deploys automatically
      # [skip ci] prevents this commit from retriggering the workflow
      - name: Commit updated deployment files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/my-app/deployment.yml apps/my-app/chatbot-deployment.yml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
