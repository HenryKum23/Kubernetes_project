name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'                 # Trigger only when app code changes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build, Scan and Push images to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build Docker Images and Push to ECR
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # Step 3 — Test eshop app
      - name: Install and test eshop
        run: |
          cd app
          npm install
          npm test --if-present

      # Step 4 — Test chatbot service
      - name: Install and test chatbot
        run: |
          cd app/chatbot
          npm install
          npm test --if-present

      # Step 5 — Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step 6 — Create ECR repositories if they do not exist
      - name: Create ECR repositories if not exists
        run: |
          aws ecr describe-repositories --repository-names my-app --region us-east-1 || \
          aws ecr create-repository --repository-name my-app \
            --image-scanning-configuration scanOnPush=true \
            --region us-east-1

          aws ecr describe-repositories --repository-names eshop-chatbot --region us-east-1 || \
          aws ecr create-repository --repository-name eshop-chatbot \
            --image-scanning-configuration scanOnPush=true \
            --region us-east-1

      # Step 7 — Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 8 — Build both Docker images
      - name: Build eshop Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }} \
            -t ${{ steps.login-ecr.outputs.registry }}/my-app:latest \
            ./app

      - name: Build chatbot Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:${{ github.sha }} \
            -t ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:latest \
            ./app/chatbot

      # Step 9 — Scan both images for vulnerabilities
      - name: Scan eshop image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Scan chatbot image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      # Step 10 — Push both images to ECR
      - name: Push eshop image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/my-app:latest

      - name: Push chatbot image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:latest

      # Step 11 — Update both deployment.yml files with new image tags
      - name: Update eshop deployment image tag
        run: |
          sed -i "s|image:.*my-app.*|image: ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }}|g" \
            apps/my-app/deployment.yml

      - name: Update chatbot deployment image tag
        run: |
          sed -i "s|image:.*eshop-chatbot.*|image: ${{ steps.login-ecr.outputs.registry }}/eshop-chatbot:${{ github.sha }}|g" \
            apps/my-app/chatbot-deployment.yml

      # Step 12 — Commit and push updated manifests
      # [skip ci] prevents this commit from retriggering the workflow
      - name: Commit updated deployment files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/my-app/deployment.yml apps/my-app/chatbot-deployment.yml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to EKS
  # Assumes cluster is already provisioned by infra.yml
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push        # Only runs after images are built and pushed

    steps:
      # Step 1 — Checkout code (needed for updated manifests)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main              # Always pull latest manifests with updated image tags

      # Step 2 — Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step 3 — Connect to the already-running cluster
      # If this fails, it means infra.yml has not been run yet
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name prod-cluster --region us-east-1

      # Step 4 — Create namespace if it does not exist
      # --dry-run=client -o yaml | kubectl apply is idempotent — safe to re-run
      - name: Create namespace
        run: |
          kubectl create namespace my-app --dry-run=client -o yaml | kubectl apply -f -

      # Step 5 — Apply Kubernetes manifests
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f apps/my-app/deployment.yml
          kubectl apply -f apps/my-app/chatbot-deployment.yml
          kubectl apply -f apps/my-app/ingress.yml

      # Step 6 — Verify both deployments rolled out successfully
      - name: Verify deployments
        run: |
          kubectl rollout status deployment/my-app --timeout=120s
          kubectl rollout status deployment/eshop-chatbot --timeout=120s

      # Step 7 — Print ingress address (ALB DNS name assigned by AWS)
      - name: Get ingress address
        run: |
          kubectl get ingress my-app -n my-app