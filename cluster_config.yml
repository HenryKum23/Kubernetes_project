apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: prod-cluster
  region: us-east-1
  version: "1.29"
  tags:
    environment: production
    team: devops
    project: eshop

# Availability Zones - 2 AZs is enough for a lightweight app (saves NAT Gateway costs)
availabilityZones:
  - us-east-1a
  - us-east-1b

# Enable OIDC for IAM Roles for Service Accounts (IRSA)
iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      wellKnownPolicies:
        awsLoadBalancerController: true
    - metadata:
        name: cluster-autoscaler
        namespace: kube-system
      wellKnownPolicies:
        autoScaler: true
    - metadata:
        name: ebs-csi-controller-sa
        namespace: kube-system
      wellKnownPolicies:
        ebsCSIController: true
    - metadata:                                    # External Secrets Operator service account
        name: external-secrets-sa
        namespace: external-secrets
      attachPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue     # Read the secret value
              - secretsmanager:DescribeSecret     # Describe secret metadata
            Resource:
              - arn:aws:secretsmanager:us-east-1:YOUR_ACCOUNT_ID:secret:floma/anthropic-api-key-*

# VPC Configuration
vpc:
  cidr: 10.0.0.0/16
  clusterEndpoints:
    publicAccess: true
    privateAccess: true
  nat:
    gateway: Single   # Single NAT Gateway to save costs (fine for learning/simple apps)

# Managed Node Groups - Right-sized for a lightweight app
managedNodeGroups:
  - name: app-nodes
    instanceType: t3.micro    # 2 vCPU, 4GB RAM — plenty for a simple app
    minSize: 1
    maxSize: 3
    desiredCapacity: 2         # 2 nodes for basic HA without over-spending
    volumeSize: 20             # 20GB is sufficient for lightweight workloads
    volumeType: gp3
    amiFamily: AmazonLinux2023 # Latest Amazon Linux 2023 AMI for EKS
    labels:
      role: app
      environment: production
    tags:
      nodegroup-role: app
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
    ssh:
      allow: false             # No SSH — use SSM Session Manager instead
    privateNetworking: true    # Nodes in private subnets (production best practice)

# Addons
addons:
  - name: vpc-cni
    version: latest
    attachPolicyARNs:
      - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest
    wellKnownPolicies:
      ebsCSIController: true

# CloudWatch Logging — keeping only essential logs to reduce cost
cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
    logRetentionInDays: 7      # 7 days is enough for a learning/project cluster
---

# ### What was added and why:
# ```
# name: external-secrets-sa        → Must match secret-store.yaml and
#                                    application.yaml exactly ✅

# namespace: external-secrets      → Same namespace ESO runs in ✅

# attachPolicy                     → Custom inline policy instead of
#                                    wellKnownPolicies because there is
#                                    no built-in policy for Secrets Manager

# Actions:
#   GetSecretValue                 → Read the actual secret value
#   DescribeSecret                 → Read secret metadata

# Resource ARN                     → Scoped to ONLY floma/anthropic-api-key
#                                    not all secrets — least privilege ✅
# ```

# ---

# ### One placeholder to replace:
# ```
# YOUR_ACCOUNT_ID → replace with your actual AWS account ID
#                   from: aws sts get-caller-identity
# ```

# ---

# ### Your updated order of operations:
# ```
# Step 1 — Store key in AWS Secrets Manager   ← next step
# Step 2 — eksctl create cluster -f cluster-config.yaml
# Step 3 — Everything else as before