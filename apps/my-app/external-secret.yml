apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: anthropic-external-secret
  namespace: my-app
spec:
  refreshInterval: 1h                        # How often to sync from AWS Secrets Manager

  secretStoreRef:
    name: aws-secrets-manager-store          # References the SecretStore we will create
    kind: SecretStore

  target:
    name: anthropic-secret                   # Name of the Kubernetes Secret to create
    creationPolicy: Owner                    # External Secrets owns and manages this secret

  data:
    - secretKey: ANTHROPIC_API_KEY           # Key name inside the Kubernetes Secret
      remoteRef:
        key: floma/anthropic-api-key         # Path of the secret in AWS Secrets Manager
        property: ANTHROPIC_API_KEY          # Property inside the AWS secret
