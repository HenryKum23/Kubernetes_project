apiVersion: v1
kind: Service
metadata:
  name: eshop-service
  namespace: my-app             # Must match the namespace in your Deployment manifests
spec:
  type: ClusterIP              # Internal only — traffic comes in through the Ingress
  selector:
    app: my-app               # Matches the label on your pods
  ports:
    - protocol: TCP
      port: 80                 # Port the service listens on
      targetPort: 3000         # Port your container listens on (Express)
