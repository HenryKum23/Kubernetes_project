apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore          # Cluster-wide — can serve all namespaces
metadata:
  name: aws-secrets-manager-store # Must match secretStoreRef.name in external-secret.yml
spec:
  provider:
    aws:
      service: SecretsManager     # Tells ESO to use AWS Secrets Manager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa       # Service account with IRSA permissions
            namespace: external-secrets     # Namespace where the service account lives
