apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager-store           # Must match secretStoreRef.name in external-secret.yaml
  namespace: my-app
spec:
  provider:
    aws:
      service: SecretsManager               # Tells ESO to use AWS Secrets Manager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa       # Service account with IRSA permissions
            namespace: external-secrets