apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://aws.github.io/eks-charts   # Official AWS EKS Helm chart repo
    chart: aws-load-balancer-controller
    targetRevision: 1.7.1
    helm:
      values: |
        clusterName: prod-cluster
        serviceAccount:
          create: false
          name: aws-load-balancer-controller   # Uses the service account created by eksctl
        region: us-east-1
        vpcId: ""                              # Leave empty — auto-detected
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false                  # kube-system already exists